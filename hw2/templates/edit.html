<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 
<div class="container mt-5">
  <h1>Update Page</h1>

 
  <form action="/update/{{ blog.id }}/" method="post">
    {% csrf_token %}
    <div class="card" style="width: 18rem;">
      <div class="card-body">
        <div class="mb-3">
          <input type="text" name="albumName" class="form-control" value="{{ blog.title }}" required>
        </div>
        <div class="mb-3">
          <textarea name="content" class="form-control card-text" rows="4">{{ blog.post_body }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary w-100">Update</button>
      </div>
    </div>
  </form>
</div>
